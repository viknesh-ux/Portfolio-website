<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Decap CMS – Admin</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    body { margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:#1a1a1a; color:#eee; }
    #nc-root { min-height:100vh; }
    .netlify-identity-widget { position:fixed; top:1rem; right:1rem; }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.open();
        }
      });
    }
    document.addEventListener('DOMContentLoaded', function() {
      if (window.CMS) {
        window.CMS.init();
      }
    });
  </script>
</head>
<body>
  <div id="nc-root"></div>
</body>
</html>
